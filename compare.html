<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流量套餐数据对比分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 24px 32px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header .update-time {
            font-size: 13px;
            opacity: 0.85;
        }

        /* ===== 控制面板 ===== */
        .control-panel {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        .mode-toggle {
            display: flex;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .mode-toggle button {
            padding: 8px 20px;
            border: none;
            background: #f5f6fa;
            color: #555;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-toggle button.active {
            background: #667eea;
            color: #fff;
        }

        .range-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .range-group label {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            min-width: 60px;
        }

        .range-group select,
        .range-group input[type="date"] {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            background: #fff;
        }

        .range-group select:focus,
        .range-group input[type="date"]:focus {
            border-color: #667eea;
        }

        .range-group .separator {
            color: #aaa;
            font-size: 13px;
        }

        .btn-compare {
            padding: 8px 24px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-compare:hover {
            background: #5568d3;
        }

        .hidden {
            display: none !important;
        }

        /* ===== 汇总信息 ===== */
        .summary-bar {
            background: #fff;
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            font-size: 14px;
        }

        .summary-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .summary-item .label {
            color: #888;
        }

        .summary-item .value {
            font-weight: 700;
            font-size: 18px;
        }

        .summary-item .value.up { color: #e85d6a; }
        .summary-item .value.down { color: #3ba272; }

        /* ===== 对比表格 ===== */
        .table-section {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .table-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }

        .compare-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .compare-table thead th {
            background: #f5f6fa;
            color: #555;
            font-weight: 600;
            padding: 12px 14px;
            text-align: right;
            border-bottom: 2px solid #e0e0e0;
            white-space: nowrap;
        }

        .compare-table thead th:first-child {
            text-align: left;
        }

        .compare-table thead th.col-product {
            cursor: pointer;
            user-select: none;
        }

        .compare-table thead th.col-product::after {
            content: " ▼";
            font-size: 10px;
            color: #aaa;
        }

        .compare-table tbody td {
            padding: 10px 14px;
            text-align: right;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        .compare-table tbody td:first-child {
            text-align: left;
            font-weight: 600;
        }

        .compare-table tbody tr.product-row {
            cursor: pointer;
            transition: background 0.15s;
        }

        .compare-table tbody tr.product-row:hover {
            background: #f9f9fc;
        }

        .compare-table tbody tr.product-row.expanded {
            background: #f0f0fa;
        }

        .compare-table .num-up { color: #e85d6a; font-weight: 600; }
        .compare-table .num-down { color: #3ba272; font-weight: 600; }
        .compare-table .num-zero { color: #aaa; }
        .compare-table .tag-new { color: #fff; background: #e85d6a; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .compare-table .tag-gone { color: #fff; background: #3ba272; padding: 2px 8px; border-radius: 4px; font-size: 11px; }

        .arrow-icon {
            display: inline-block;
            width: 16px;
            text-align: center;
            font-size: 12px;
            color: #999;
            transition: transform 0.2s;
        }

        .product-row.expanded .arrow-icon {
            transform: rotate(90deg);
        }

        /* ===== 明细行 ===== */
        .detail-row td {
            padding: 0 !important;
            border-bottom: 1px solid #e8e8f0 !important;
            background: #fafafe;
        }

        .detail-inner {
            padding: 12px 24px 16px 48px;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .detail-table thead th {
            background: #f0f0f8;
            color: #777;
            font-weight: 600;
            padding: 8px 12px;
            text-align: right;
            border-bottom: 1px solid #e0e0e8;
            white-space: nowrap;
        }

        .detail-table thead th:first-child {
            text-align: left;
        }

        .detail-table tbody td {
            padding: 7px 12px;
            text-align: right;
            border-bottom: 1px solid #f0f0f4;
            color: #555;
        }

        .detail-table tbody td:first-child {
            text-align: left;
        }

        .detail-table .domain-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .domain-tag.公域 { background: #fce8ea; color: #e85d6a; }
        .domain-tag.私域 { background: #e6f4ea; color: #3ba272; }
        .domain-tag.外部渠道 { background: #fef3da; color: #d4a017; }

        /* ===== 趋势条 ===== */
        .trend-bar {
            display: inline-block;
            height: 8px;
            border-radius: 4px;
            vertical-align: middle;
            min-width: 2px;
        }

        .trend-bar.up { background: #e85d6a; }
        .trend-bar.down { background: #3ba272; }

        .trend-container {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: flex-end;
        }

        /* ===== 充流量TOP10 对比表格 ===== */
        .cll-rank {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            text-align: center;
        }

        .cll-rank-1 { background: #e85d6a; }
        .cll-rank-2 { background: #ff8c42; }
        .cll-rank-3 { background: #fac858; }
        .cll-rank-4 { background: #3ba272; }
        .cll-rank-5 { background: #667eea; }
        .cll-rank-6, .cll-rank-7, .cll-rank-8, .cll-rank-9, .cll-rank-10 {
            background: #9c27b0;
        }

        .chart-container {
            width: 100%;
            height: 100%;
            min-height: 300px;
        }

        /* ===== 表格+图表并排布局 ===== */
        .table-chart-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .table-chart-wrapper .table-side {
            flex: 1 1 58%;
            min-width: 0;
            overflow-x: auto;
        }

        .table-chart-wrapper .chart-side {
            flex: 1 1 42%;
            min-width: 0;
            min-height: 300px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .control-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>

</head>
<body>

<div class="header">
    <h1>北京移动流量套餐数据对比分析</h1>
    <div style="display:flex;align-items:center;gap:16px;">
        <a href="index.html" style="padding:6px 18px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:6px;color:#fff;text-decoration:none;font-size:14px;font-weight:600;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'">← 返回看板</a>
        <span class="update-time" id="updateTime"></span>
    </div>
</div>

<!-- ===== 控制面板 ===== -->
<div class="control-panel">
    <div class="control-row">
        <div class="mode-toggle">
            <button id="modeMonth" class="active" onclick="switchMode('month')">按月对比</button>
            <button id="modeDate" onclick="switchMode('date')">自定义日期</button>
        </div>
    </div>

    <!-- 按月模式 -->
    <div class="control-row" id="monthMode">
        <div class="range-group">
            <label>时段A：</label>
            <select id="monthA"></select>
        </div>
        <div class="range-group">
            <label>时段B：</label>
            <select id="monthB"></select>
        </div>
        <button class="btn-compare" onclick="runCompare()">开始对比</button>
    </div>

    <!-- 自定义日期模式 -->
    <div class="control-row hidden" id="dateMode">
        <div class="range-group">
            <label>时段A：</label>
            <input type="date" id="dateAStart">
            <span class="separator">~</span>
            <input type="date" id="dateAEnd">
        </div>
        <div class="range-group">
            <label>时段B：</label>
            <input type="date" id="dateBStart">
            <span class="separator">~</span>
            <input type="date" id="dateBEnd">
        </div>
        <button class="btn-compare" onclick="runCompare()">开始对比</button>
    </div>
</div>

<!-- ===== 汇总信息 ===== -->
<div class="summary-bar" id="summaryBar">
    <div class="summary-item">
        <span class="label">对比范围：</span>
        <span id="summaryRange" style="font-weight:600;color:#333;font-size:14px;">请选择时间范围并点击对比</span>
    </div>
</div>

<!-- ===== 产品对比表格 ===== -->
<div class="table-section">
    <div class="table-title">产品单量对比（点击产品行展开渠道点位明细）</div>
    <div style="overflow-x:auto;">
        <table class="compare-table" id="productTable">
            <thead>
                <tr>
                    <th class="col-product">统一产品名称</th>
                    <th>时段A单量</th>
                    <th>时段B单量</th>
                    <th>差值</th>
                    <th>涨跌幅</th>
                    <th>趋势</th>
                </tr>
            </thead>
            <tbody id="productTbody"></tbody>
        </table>
    </div>
</div>

<!-- ===== 公域渠道点位对比 ===== -->
<div class="table-section">
    <div class="table-title">公域渠道点位单量对比（投放点位 × 具体投放位置）</div>
    <div class="table-chart-wrapper">
        <div class="table-side">
            <table class="compare-table" id="channelPublicTable">
                <thead>
                    <tr>
                        <th style="text-align:left;">投放点位</th>
                        <th style="text-align:left;">具体投放位置</th>
                        <th>时段A单量</th>
                        <th>时段B单量</th>
                        <th>差值</th>
                        <th>涨跌幅</th>
                        <th>趋势</th>
                    </tr>
                </thead>
                <tbody id="channelPublicTbody"></tbody>
            </table>
        </div>
        <div class="chart-side">
            <div id="channelPublicChart" class="chart-container"></div>
        </div>
    </div>
</div>

<!-- ===== 私域渠道点位对比 ===== -->
<div class="table-section">
    <div class="table-title">私域渠道点位单量对比（投放点位）</div>
    <div class="table-chart-wrapper">
        <div class="table-side">
            <table class="compare-table" id="channelPrivateTable">
                <thead>
                    <tr>
                        <th style="text-align:left;">投放点位</th>
                        <th>时段A单量</th>
                        <th>时段B单量</th>
                        <th>差值</th>
                        <th>涨跌幅</th>
                        <th>趋势</th>
                    </tr>
                </thead>
                <tbody id="channelPrivateTbody"></tbody>
            </table>
        </div>
        <div class="chart-side">
            <div id="channelPrivateChart" class="chart-container"></div>
        </div>
    </div>
</div>

<!-- ===== 充流量频道TOP10产品对比 ===== -->
<div class="table-section">
    <div class="table-title">充流量频道销量TOP10产品对比（按时段B单量排序）</div>
    <div style="overflow-x:auto;">
        <table class="compare-table" id="cllTable">

function diffClass(val) {
    if (val > 0) return 'num-up';
    if (val < 0) return 'num-down';
    return 'num-zero';
}

function pctClass(val) {
    if (val === null) return '';
    return val >= 0 ? 'num-up' : 'num-down';
}

// ===== 模式切换 =====
function switchMode(mode) {
    if (mode === 'month') {
        document.getElementById('modeMonth').classList.add('active');
        document.getElementById('modeDate').classList.remove('active');
        document.getElementById('monthMode').classList.remove('hidden');
        document.getElementById('dateMode').classList.add('hidden');
    } else {

        document.getElementById('modeDate').classList.add('active');
        document.getElementById('monthMode').classList.add('hidden');
        document.getElementById('dateMode').classList.remove('hidden');
    }
}

// ===== 获取日期范围内的日期列表 =====
function getDatesInRange(startDate, endDate) {
    const result = [];
    const start = new Date(startDate);
    const end = new Date(endDate);
    const cur = new Date(start);
    while (cur <= end) {
        const y = cur.getFullYear();
        const m = String(cur.getMonth() + 1).padStart(2, '0');
        const d = String(cur.getDate()).padStart(2, '0');
        result.push(`${y}-${m}-${d}`);
        cur.setDate(cur.getDate() + 1);
    }
    return result;
}

function getMonthDates(monthKey) {
    // monthKey: "2026-06"
    const [year, month] = monthKey.split('-').map(Number);
    const dates = [];
    for (const d of COMPARE_DATA.all_dates) {
        if (d.startsWith(monthKey + '-')) {
            dates.push(d);
        }
    }
    return dates;
}

function datesLabel(dates) {
    if (!dates || dates.length === 0) return '无数据';
    return dates[0] + ' ~ ' + dates[dates.length - 1] + ' (' + dates.length + '天)';
}

// ===== 聚合计算 =====
function aggregateRange(dates) {
    // 返回 { product: { domain: { channel: count } } }
    const result = {};
    for (const date of dates) {
        const dayData = COMPARE_DATA.product_detail[date];
        if (!dayData) continue;
        for (const [product, domains] of Object.entries(dayData)) {
            if (!result[product]) result[product] = {};
            for (const [domain, channels] of Object.entries(domains)) {
                if (!result[product][domain]) result[product][domain] = {};
                for (const [channel, count] of Object.entries(channels)) {
                    result[product][domain][channel] = (result[product][domain][channel] || 0) + count;
                }
            }
        }
    }
    return result;
}

function productTotal(aggData, product) {
    if (!aggData[product]) return 0;
    let sum = 0;
    for (const domains of Object.values(aggData[product])) {
        for (const count of Object.values(domains)) {
            sum += count;
        }
    }
    return sum;
}

// ===== 执行对比 =====
function runCompare() {
    let datesA, datesB, labelA, labelB;

    if (!document.getElementById('dateMode').classList.contains('hidden')) {
        // 自定义日期模式
        const aStart = document.getElementById('dateAStart').value;
        const aEnd = document.getElementById('dateAEnd').value;
        const bStart = document.getElementById('dateBStart').value;
        const bEnd = document.getElementById('dateBEnd').value;
        if (!aStart || !aEnd || !bStart || !bEnd) {
            alert('请选择完整的日期范围');
            return;
        }
        if (aStart > aEnd || bStart > bEnd) {
            alert('日期范围有误：起始日期不能晚于结束日期');
            return;
        }
        datesA = getDatesInRange(aStart, aEnd);
        datesB = getDatesInRange(bStart, bEnd);
        labelA = aStart + ' ~ ' + aEnd;
        labelB = bStart + ' ~ ' + bEnd;
    } else {
        // 按月模式
        const monthA = document.getElementById('monthA').value;
        const monthB = document.getElementById('monthB').value;
        if (!monthA || !monthB) {
            alert('请选择月份');
            return;
        }
        datesA = getMonthDates(monthA);
        datesB = getMonthDates(monthB);
        labelA = monthA.replace('-', '年') + '月';
        labelB = monthB.replace('-', '年') + '月';
    }

    currentRangeA = { dates: datesA, label: labelA };
    currentRangeB = { dates: datesB, label: labelB };

    const aggA = aggregateRange(datesA);
    const aggB = aggregateRange(datesB);

    // 收集所有产品
    const allProducts = new Set([...Object.keys(aggA), ...Object.keys(aggB)]);

    // 构建对比数据
    const compareList = [];
    for (const product of allProducts) {
        const totalA = productTotal(aggA, product);
        const totalB = productTotal(aggB, product);
        const diff = totalB - totalA;
        const pct = totalA > 0 ? ((totalB - totalA) / totalA) * 100 : null;

        // 明细
        const details = [];
        const allDomains = new Set([
            ...Object.keys(aggA[product] || {}),
            ...Object.keys(aggB[product] || {})
        ]);
        for (const domain of allDomains) {
            const allChannels = new Set([
                ...Object.keys((aggA[product] || {})[domain] || {}),
                ...Object.keys((aggB[product] || {})[domain] || {})
            ]);
            for (const channel of allChannels) {
                const valA = (aggA[product] || {})[domain]?.[channel] || 0;
                const valB = (aggB[product] || {})[domain]?.[channel] || 0;
                const dDiff = valB - valA;
                const dPct = valA > 0 ? ((valB - valA) / valA) * 100 : null;
                details.push({ domain, channel, valA, valB, diff: dDiff, pct: dPct });
            }
        }
        // 明细按差值绝对值降序
        details.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));

        compareList.push({ product, totalA, totalB, diff, pct, details });
    }

    // 按差值绝对值降序
    compareList.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));
    currentCompareResult = compareList;

    renderSummary(labelA, labelB, compareList);
    renderProductTable(compareList);
    renderChannelPublicTable(datesA, datesB);
    renderChannelPrivateTable(datesA, datesB);
    renderCllTopTable(datesA, datesB);
}

// ===== 渲染汇总 =====
function renderSummary(labelA, labelB, list) {
    let totalA = 0, totalB = 0;
    for (const item of list) {
        totalA += item.totalA;
        totalB += item.totalB;
    }
    const totalDiff = totalB - totalA;
    const totalPct = totalA > 0 ? ((totalB - totalA) / totalA * 100) : null;
    const diffClass = totalDiff >= 0 ? 'up' : 'down';

    document.getElementById('summaryBar').innerHTML = `
        <div class="summary-item">
            <span class="label">对比范围：</span>
            <span style="font-weight:600;color:#333;font-size:14px;">${labelA} → ${labelB}</span>
        </div>
        <div class="summary-item">
            <span class="label">时段A总计：</span>
            <span class="value" style="color:#667eea;">${formatNumber(totalA)}</span>
        </div>
        <div class="summary-item">
            <span class="label">时段B总计：</span>
            <span class="value" style="color:#667eea;">${formatNumber(totalB)}</span>
        </div>
        <div class="summary-item">
            <span class="label">差值：</span>
            <span class="value ${diffClass}">${totalDiff >= 0 ? '+' : ''}${formatNumber(totalDiff)}</span>
        </div>
        <div class="summary-item">
            <span class="label">涨跌幅：</span>
            <span class="value ${diffClass}">${totalPct !== null ? formatPct(totalPct) : '—'}</span>
        </div>
        <div class="summary-item">
            <span class="label">产品数：</span>
            <span class="value" style="color:#333;">${list.length}</span>
        </div>
    `;
}

                    item.totalB === 0 && item.totalA > 0 ? '<span class="tag-gone">消失</span>' : '';
        const barWidth = Math.max(2, (Math.abs(item.diff) / maxAbsDiff) * 100);
        const barClass = item.diff >= 0 ? 'up' : 'down';

        html += `<tr class="product-row" onclick="toggleDetail(${i})" id="row-${i}">

// ===== 渲染充流量TOP10对比表格 =====
function renderCllTopTable(datesA, datesB) {
    const cllData = COMPARE_DATA.cll_product_daily || {};

    // 聚合时段A
    const sumA = {};
    for (const date of datesA) {
        const dayData = cllData[date];
        if (!dayData) continue;
        for (const [name, val] of Object.entries(dayData)) {
            sumA[name] = (sumA[name] || 0) + val;
        }
    }

    // 聚合时段B
    const sumB = {};
    for (const date of datesB) {
        const dayData = cllData[date];
        if (!dayData) continue;
        for (const [name, val] of Object.entries(dayData)) {
            sumB[name] = (sumB[name] || 0) + val;
        }
    }

    // 合并所有产品，按时段B单量降序取TOP10
    const allProducts = new Set([...Object.keys(sumA), ...Object.keys(sumB)]);
    const list = [];
    for (const product of allProducts) {
        const valA = sumA[product] || 0;
        const valB = sumB[product] || 0;
        const diff = valB - valA;
        const pct = valA > 0 ? ((valB - valA) / valA) * 100 : null;
        list.push({ product, valA, valB, diff, pct });
    }
    // 按时段B单量降序，取TOP10
    list.sort((a, b) => b.valB - a.valB);
    const top10 = list.slice(0, 10);

    // 趋势条缩放：用差值绝对值的最大值
    const maxAbsDiff = top10.length > 0 ? Math.max(...top10.map(i => Math.abs(i.diff)), 1) : 1;

    const tbody = document.getElementById('cllTbody');
    let html = '';

    if (top10.length === 0) {
        html = '<tr><td colspan="7" style="color:#ccc;text-align:center;padding:16px;">所选时段无充流量频道数据</td></tr>';
    } else {
        for (let i = 0; i < top10.length; i++) {
            const item = top10[i];
            const diffStr = (item.diff >= 0 ? '+' : '') + formatNumber(item.diff);
            const pctStr = item.pct !== null ? formatPct(item.pct) : '';
            const tag = item.valA === 0 && item.valB > 0 ? '<span class="tag-new">新增</span>' :
                        item.valB === 0 && item.valA > 0 ? '<span class="tag-gone">消失</span>' : '';
            const barWidth = Math.max(2, (Math.abs(item.diff) / maxAbsDiff) * 100);
            const barClass = item.diff >= 0 ? 'up' : 'down';

            html += `<tr>
                <td><span class="cll-rank cll-rank-${i + 1}">${i + 1}</span></td>
                <td style="text-align:left;font-weight:600;">${item.product}</td>
                <td>${formatNumber(item.valA)}</td>
                <td>${formatNumber(item.valB)}</td>
                <td class="${diffClass(item.diff)}">${diffStr}</td>
                <td class="${pctClass(item.pct)}">${pctStr} ${tag}</td>
                <td>
                    <div class="trend-container">
                        <div class="trend-bar ${barClass}" style="width:${barWidth}px;"></div>
                    </div>
                </td>
            </tr>`;
        }
    }

    tbody.innerHTML = html;
}

// ===== 渲染公域渠道点位对比表格 =====
function renderChannelPublicTable(datesA, datesB) {
    const data = COMPARE_DATA.channel_public_daily || {};

    // 聚合时段A: {channel: {location: count}}
    const sumA = {};
    for (const date of datesA) {
        const dayData = data[date];
        if (!dayData) continue;
        for (const [channel, locations] of Object.entries(dayData)) {
            if (!sumA[channel]) sumA[channel] = {};
            for (const [location, count] of Object.entries(locations)) {
                sumA[channel][location] = (sumA[channel][location] || 0) + count;
            }
        }
    }

    // 聚合时段B
    const sumB = {};
    for (const date of datesB) {
        const dayData = data[date];
        if (!dayData) continue;
        for (const [channel, locations] of Object.entries(dayData)) {
            if (!sumB[channel]) sumB[channel] = {};
            for (const [location, count] of Object.entries(locations)) {
                sumB[channel][location] = (sumB[channel][location] || 0) + count;
            }
        }
    }

    // 构建对比列表
    const allChannels = new Set([...Object.keys(sumA), ...Object.keys(sumB)]);
    const list = [];
    for (const channel of allChannels) {
        const allLocations = new Set([
            ...Object.keys(sumA[channel] || {}),
            ...Object.keys(sumB[channel] || {})
        ]);
        for (const location of allLocations) {
            const valA = (sumA[channel] || {})[location] || 0;
            const valB = (sumB[channel] || {})[location] || 0;
            const diff = valB - valA;
            const pct = valA > 0 ? ((valB - valA) / valA) * 100 : null;
            list.push({ channel, location, valA, valB, diff, pct });
        }
    }

    // 增加充流量汇总行
    const cllItems = list.filter(item => item.channel === '充流量');
    if (cllItems.length > 0) {
        let sumA_total = 0, sumB_total = 0;
        for (const item of cllItems) {
            sumA_total += item.valA;
            sumB_total += item.valB;
        }
        const diff = sumB_total - sumA_total;
        const pct = sumA_total > 0 ? ((sumB_total - sumA_total) / sumA_total) * 100 : null;
        list.push({ channel: '充流量', location: '汇总', valA: sumA_total, valB: sumB_total, diff, pct, isSummary: true });
    }

    // 自定义排序：充流量-汇总 → 充流量-爆品专区 → 充流量-楼层 → 充流量-tab3楼层 → 移动营业厅-精选流量
    const PUB_ORDER = ['充流量-汇总', '充流量-爆品专区', '充流量-楼层', '充流量-tab3楼层', '移动营业厅-精选流量'];
    const pubSortKey = (item) => {
        const key = item.channel + '-' + item.location;
        const idx = PUB_ORDER.indexOf(key);
        return idx >= 0 ? idx : 999;
    };
    list.sort((a, b) => {
        const sa = pubSortKey(a);
        const sb = pubSortKey(b);
        if (sa !== sb) return sa - sb;
        return Math.abs(b.diff) - Math.abs(a.diff);
    });

    const maxAbsDiff = list.length > 0 ? Math.max(...list.map(i => Math.abs(i.diff)), 1) : 1;

    const tbody = document.getElementById('channelPublicTbody');
    let html = '';

    if (list.length === 0) {
        html = '<tr><td colspan="7" style="color:#ccc;text-align:center;padding:16px;">所选时段无公域渠道点位数据</td></tr>';
    } else {
        for (const item of list) {
            const diffStr = (item.diff >= 0 ? '+' : '') + formatNumber(item.diff);
            const pctStr = item.pct !== null ? formatPct(item.pct) : '';
            const tag = item.valA === 0 && item.valB > 0 ? '<span class="tag-new">新增</span>' :
                        item.valB === 0 && item.valA > 0 ? '<span class="tag-gone">消失</span>' : '';
            const barWidth = Math.max(2, (Math.abs(item.diff) / maxAbsDiff) * 100);
            const barClass = item.diff >= 0 ? 'up' : 'down';
            const summaryStyle = item.isSummary ? 'background:#f0f0fa;' : '';

            html += `<tr style="${summaryStyle}">
                <td style="text-align:left;font-weight:600;">${item.channel}</td>
                <td style="text-align:left;color:#666;font-weight:${item.isSummary ? '700' : '400'};">${item.location}</td>
                <td>${formatNumber(item.valA)}</td>
                <td>${formatNumber(item.valB)}</td>
                <td class="${diffClass(item.diff)}">${diffStr}</td>
                <td class="${pctClass(item.pct)}">${pctStr} ${tag}</td>
                <td>
                    <div class="trend-container">
                        <div class="trend-bar ${barClass}" style="width:${barWidth}px;"></div>
                    </div>
                </td>
            </tr>`;
        }
    }

    tbody.innerHTML = html;

    // 渲染图表
    renderChannelPublicChart(list);
}

    for (const date of datesB) {

        if (!dayData) continue;

            sumB[channel] = (sumB[channel] || 0) + count;
        }

        const ib = PRI_ORDER.indexOf(b.channel);
        const sa = ia >= 0 ? ia : 999;
        const sb = ib >= 0 ? ib : 999;
        if (sa !== sb) return sa - sb;
        return Math.abs(b.diff) - Math.abs(a.diff);
    });

    const maxAbsDiff = list.length > 0 ? Math.max(...list.map(i => Math.abs(i.diff)), 1) : 1;

    const tbody = document.getElementById('channelPrivateTbody');
    let html = '';

        html = '<tr><td colspan="6" style="color:#ccc;text-align:center;padding:16px;">所选时段无私域渠道点位数据</td></tr>';
    } else {
        for (const item of list) {
            const diffStr = (item.diff >= 0 ? '+' : '') + formatNumber(item.diff);
            const pctStr = item.pct !== null ? formatPct(item.pct) : '';
            const tag = item.valA === 0 && item.valB > 0 ? '<span class="tag-new">新增</span>' :
                        item.valB === 0 && item.valA > 0 ? '<span class="tag-gone">消失</span>' : '';
            const barWidth = Math.max(2, (Math.abs(item.diff) / maxAbsDiff) * 100);
            const barClass = item.diff >= 0 ? 'up' : 'down';

            html += `<tr>
                <td style="text-align:left;font-weight:600;">${item.channel}</td>
                <td>${formatNumber(item.valA)}</td>
                <td>${formatNumber(item.valB)}</td>
                <td class="${diffClass(item.diff)}">${diffStr}</td>
                <td class="${pctClass(item.pct)}">${pctStr} ${tag}</td>
                <td>
                    <div class="trend-container">
                        <div class="trend-bar ${barClass}" style="width:${barWidth}px;"></div>
                    </div>
                </td>
            </tr>`;
        }
    }

    tbody.innerHTML = html;

    // 渲染图表
    renderChannelPrivateChart(list);
}

// ===== 渲染私域渠道点位对比图表 =====
function renderChannelPrivateChart(list) {
    const chartDom = document.getElementById('channelPrivateChart');
    if (!chartDom) return;

    if (channelPrivateChart) {
        channelPrivateChart.dispose();
    }
    channelPrivateChart = echarts.init(chartDom);

    if (list.length === 0) {
        channelPrivateChart.setOption({
            title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#ccc', fontSize: 14 } }
        });
        return;
    }

    const categories = list.map(item => item.channel);
    const valA = list.map(item => item.valA);
    const valB = list.map(item => item.valB);

    const labelA = currentRangeA ? currentRangeA.label : '时段A';
    const labelB = currentRangeB ? currentRangeB.label : '时段B';

    channelPrivateChart.setOption({
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' },
            formatter: function(params) {
                let html = params[0].name + '<br/>';
                for (const p of params) {
                    html += `${p.marker} ${p.seriesName}: ${formatNumber(p.value)}<br/>`;
                }
                return html;
            }
        },
        legend: {
            data: [labelA, labelB],
            top: 0,
            textStyle: { fontSize: 12 }
        },
        grid: {
            left: '3%',
            right: '5%',
            bottom: '3%',
            top: 40,
            containLabel: true
        },
        xAxis: { type: 'value', axisLabel: { fontSize: 11 } },
        yAxis: {
            type: 'category',
            data: categories,
            inverse: true,
            axisLabel: { fontSize: 12 }
        },
        series: [
            {
                name: labelA,
                type: 'bar',
                data: valA,
                itemStyle: { color: '#5470c6', borderRadius: [0, 3, 3, 0] },
                barGap: '10%',
                barCategoryGap: '40%'
            },
            {
                name: labelB,
                type: 'bar',
                data: valB,
                itemStyle: { color: '#fac858', borderRadius: [0, 3, 3, 0] }
            }
        ]
    });
}

// ===== 展开/折叠明细 =====
function toggleDetail(index) {
    const row = document.getElementById('row-' + index);
    const detail = document.getElementById('detail-' + index);
    if (row.classList.contains('expanded')) {
        row.classList.remove('expanded');
        detail.classList.add('hidden');
    } else {
        row.classList.add('expanded');
        detail.classList.remove('hidden');
    }
}

// ===== 初始化 =====
function init() {
    // 更新时间
    document.getElementById('updateTime').textContent = `数据更新于 ${COMPARE_DATA.generated_at}`;

    // 填充月份选择器
    const months = COMPARE_DATA.months;
    const monthOptions = months.map(m => {
        const label = m.replace('-', '年') + '月';
        return `<option value="${m}">${label}</option>`;
    }).join('');
    document.getElementById('monthA').innerHTML = monthOptions;
    document.getElementById('monthB').innerHTML = monthOptions;

    // 默认选择：倒数第二个月 vs 最后一个月
    if (months.length >= 2) {
        document.getElementById('monthA').value = months[months.length - 2];
        document.getElementById('monthB').value = months[months.length - 1];
    }

    // 填充日期选择器范围
    const allDates = COMPARE_DATA.all_dates;
    if (allDates.length > 0) {
        const minDate = allDates[0];
        const maxDate = allDates[allDates.length - 1];
        ['dateAStart', 'dateAEnd', 'dateBStart', 'dateBEnd'].forEach(id => {
            const el = document.getElementById(id);
            el.min = minDate;
            el.max = maxDate;
        });
        // 默认值：上月1日~上月末日 vs 本月1日~本月末日
        if (months.length >= 2) {
            const prevMonth = months[months.length - 2];
            const curMonth = months[months.length - 1];
            document.getElementById('dateAStart').value = prevMonth + '-01';
            document.getElementById('dateAEnd').value = maxDate.startsWith(curMonth) ? maxDate : prevMonth + '-28';
            document.getElementById('dateBStart').value = curMonth + '-01';
            document.getElementById('dateBEnd').value = maxDate;
        }
    }

    // 自动执行一次对比
    runCompare();
}

document.addEventListener('DOMContentLoaded', init);

window.addEventListener('resize', function() {
    if (channelPublicChart) channelPublicChart.resize();
    if (channelPrivateChart) channelPrivateChart.resize();
});
</script>
